name: Collect Visitor Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Collect daily snapshot
        env:
          VISITOR_STATS_SITE_URL: ${{ vars.VISITOR_STATS_SITE_URL || format('https://{0}.github.io/', github.repository_owner) }}
        run: |
          python scripts/collect_visitor_stats.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- files/visitor-stats.json; then
            echo "No visitor stats changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add files/visitor-stats.json
          git commit -m "chore: update visitor stats snapshot"
          git push
