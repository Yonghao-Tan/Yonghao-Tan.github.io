<div class="visitor-chart-card">
  <div class="visitor-chart-head">
    <div class="visitor-chart-kicker">Live Traffic</div>
    <h3 class="visitor-chart-title">Visitor History</h3>
    <p class="visitor-chart-subtitle">Cumulative site views over recent days</p>
  </div>

  <div class="visitor-chart-canvas-wrap">
    <canvas id="visitorChart" class="visitor-chart-canvas"></canvas>
  </div>

  <div class="visitor-chart-meta">
    <span class="visitor-chip" id="busuanzi_container_site_pv">
      <i class="fa fa-eye"></i> Total Views: <span id="busuanzi_value_site_pv">--</span>
    </span>
    <span class="visitor-chip" id="busuanzi_container_site_uv">
      <i class="fa fa-user"></i> Total Visitors: <span id="busuanzi_value_site_uv">--</span>
    </span>
    <span class="visitor-chip">
      <i class="fa fa-calendar"></i> Last Snapshot: <span id="visitor_last_snapshot">--</span>
    </span>
  </div>
</div>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
  .visitor-chart-card {
    position: relative;
    overflow: hidden;
    margin-top: 40px;
    padding: 18px 16px 14px;
    border: 1px solid #f0d9cd;
    border-radius: 18px;
    background: linear-gradient(135deg, #fffefb 0%, #fff7f2 55%, #f7fbff 100%);
    box-shadow: 0 10px 26px rgba(227, 83, 47, 0.10), 0 4px 10px rgba(31, 31, 31, 0.05);
    animation: visitorCardIn 420ms ease-out;
  }

  .visitor-chart-card::before {
    content: "";
    position: absolute;
    width: 220px;
    height: 220px;
    top: -80px;
    right: -60px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255, 126, 74, 0.24) 0%, rgba(255, 126, 74, 0) 72%);
    pointer-events: none;
  }

  .visitor-chart-head {
    margin-bottom: 8px;
  }

  .visitor-chart-kicker {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(227, 83, 47, 0.14);
    color: #c74421;
    font-family: "Sora", sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  .visitor-chart-title {
    margin: 8px 0 2px;
    color: #191919;
    font-family: "Caveat", cursive;
    font-size: 46px;
    line-height: 1;
  }

  .visitor-chart-subtitle {
    margin: 0;
    color: #6b5f58;
    font-family: "Sora", sans-serif;
    font-size: 13px;
  }

  .visitor-chart-canvas-wrap {
    width: 100%;
    height: 380px;
  }

  .visitor-chart-canvas {
    width: 100%;
    height: 100%;
  }

  .visitor-chart-meta {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
  }

  .visitor-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 12px;
    border: 1px solid #eadbd2;
    border-radius: 999px;
    color: #564a43;
    background: rgba(255, 255, 255, 0.75);
    font-family: "Sora", sans-serif;
    font-size: 13px;
  }

  @keyframes visitorCardIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 768px) {
    .visitor-chart-card {
      margin-top: 28px;
      padding: 14px 10px 10px;
      border-radius: 14px;
    }

    .visitor-chart-title {
      font-size: 40px;
    }

    .visitor-chart-subtitle {
      font-size: 12px;
    }

    .visitor-chart-canvas-wrap {
      height: 280px;
    }

    .visitor-chip {
      font-size: 12px;
      padding: 6px 10px;
      gap: 6px;
    }
  }
</style>

<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
(function () {
  var MAX_DAYS = 90;
  var DATA_URL = "{{ '/files/visitor-stats.json' | relative_url }}";
  var chartInstance = null;

  function toNumber(value) {
    var n = Number(value);
    return Number.isFinite(n) ? n : 0;
  }

  function normalizeRecords(rawRecords) {
    var mapByDate = {};
    (rawRecords || []).forEach(function (item) {
      if (!item || !item.date) return;
      mapByDate[item.date] = {
        date: item.date,
        site_pv: toNumber(item.site_pv),
        site_uv: toNumber(item.site_uv),
        page_pv: toNumber(item.page_pv)
      };
    });

    return Object.values(mapByDate).sort(function (a, b) {
      return a.date.localeCompare(b.date);
    });
  }

  function formatLabel(dateText) {
    var parts = dateText.split("-");
    if (parts.length !== 3) return dateText;
    return parts[1] + "-" + parts[2];
  }

  function chooseStepSize(maxValue) {
    if (maxValue <= 20) return 5;
    if (maxValue <= 100) return 10;
    if (maxValue <= 500) return 50;
    if (maxValue <= 1000) return 100;
    if (maxValue <= 5000) return 500;
    return 1000;
  }

  function formatTick(value) {
    if (value >= 1000000) return (value / 1000000).toFixed(1) + "M";
    if (value >= 1000) return (value / 1000).toFixed(0) + "K";
    return String(Math.round(value));
  }

  function fitText(ctx, text, maxWidth) {
    if (ctx.measureText(text).width <= maxWidth) return text;
    var base = text;
    while (base.length > 4 && ctx.measureText(base + "...").width > maxWidth) {
      base = base.slice(0, -1);
    }
    return base + "...";
  }

  function buildCumulativeSeries(records) {
    if (!records.length) return { labels: [], values: [] };

    var start = Math.max(0, records.length - MAX_DAYS);
    var labels = [];
    var values = [];

    for (var i = start; i < records.length; i += 1) {
      labels.push(formatLabel(records[i].date));
      values.push(records[i].site_pv);
    }

    if (labels.length === 1) {
      labels.unshift(labels[0]);
      values.unshift(0);
    }

    return { labels: labels, values: values };
  }

  function setLastSnapshot(text) {
    var el = document.getElementById("visitor_last_snapshot");
    if (el) el.textContent = text || "--";
  }

  function setSnapshotTotals(latest) {
    if (!latest) return;
    var pv = document.getElementById("busuanzi_value_site_pv");
    var uv = document.getElementById("busuanzi_value_site_uv");
    if (pv && (!pv.textContent || pv.textContent === "--")) pv.textContent = latest.site_pv;
    if (uv && (!uv.textContent || uv.textContent === "--")) uv.textContent = latest.site_uv;
  }

  function createDecorPlugin(repoLabel) {
    function drawRoundRect(ctx, x, y, width, height, radius) {
      var r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    return {
      id: "visitorDecor",
      afterDatasetsDraw: function (chart) {
        var ctx = chart.ctx;
        var area = chart.chartArea;
        if (!area) return;

        var meta = chart.getDatasetMeta(0);
        var lastPoint = meta && meta.data && meta.data.length ? meta.data[meta.data.length - 1] : null;

        ctx.save();

        var maxLabelWidth = Math.min(300, area.width * 0.46);
        ctx.font = '600 14px "Sora", sans-serif';
        ctx.textBaseline = "middle";
        var shortLabel = fitText(ctx, repoLabel, maxLabelWidth - 28);
        var textWidth = ctx.measureText(shortLabel).width;
        var boxW = textWidth + 36;
        var boxH = 30;
        var boxX = area.left + 10;
        var boxY = area.top + 10;

        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "#332f2d";
        ctx.fillStyle = "rgba(255, 255, 255, 0.84)";
        drawRoundRect(ctx, boxX, boxY, boxW, boxH, 8);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#e3532f";
        ctx.beginPath();
        ctx.arc(boxX + 12, boxY + (boxH / 2), 4.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#2a2624";
        ctx.fillText(shortLabel, boxX + 22, boxY + (boxH / 2));

        if (lastPoint) {
          ctx.fillStyle = "rgba(227, 83, 47, 0.20)";
          ctx.beginPath();
          ctx.arc(lastPoint.x, lastPoint.y, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#e3532f";
          ctx.beginPath();
          ctx.arc(lastPoint.x, lastPoint.y, 5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }
    };
  }

  function renderChart(labels, values, repoLabel) {
    var canvas = document.getElementById("visitorChart");
    if (!canvas || typeof Chart === "undefined") return;

    if (chartInstance) chartInstance.destroy();

    var maxValue = values.length ? Math.max.apply(null, values) : 0;
    var stepSize = chooseStepSize(maxValue);
    var suggestedMax = Math.max(stepSize * 2, Math.ceil((maxValue * 1.26) / stepSize) * stepSize);

    chartInstance = new Chart(canvas, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          data: values,
          borderWidth: 3.5,
          fill: true,
          tension: 0.22,
          pointRadius: 0,
          pointHoverRadius: 5,
          borderColor: function (ctx) {
            var chart = ctx.chart;
            var area = chart.chartArea;
            if (!area) return "#e3532f";
            var gradient = chart.ctx.createLinearGradient(area.left, area.top, area.right, area.bottom);
            gradient.addColorStop(0, "#ff6a3c");
            gradient.addColorStop(0.58, "#ff8a3d");
            gradient.addColorStop(1, "#f0456f");
            return gradient;
          },
          backgroundColor: function (ctx) {
            var chart = ctx.chart;
            var area = chart.chartArea;
            if (!area) return "rgba(227, 83, 47, 0.18)";
            var gradient = chart.ctx.createLinearGradient(0, area.top, 0, area.bottom);
            gradient.addColorStop(0, "rgba(255, 122, 76, 0.28)");
            gradient.addColorStop(1, "rgba(255, 122, 76, 0.01)");
            return gradient;
          }
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
          duration: 1000,
          easing: "easeOutQuart"
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            displayColors: false,
            callbacks: {
              title: function (items) { return items[0].label; },
              label: function (item) { return "Views: " + item.formattedValue; }
            }
          }
        },
        scales: {
          x: {
            title: {
              display: true,
              text: "Date",
              color: "#2f2f2f",
              font: { family: "Sora, sans-serif", size: 14, weight: "600" }
            },
            ticks: {
              color: "#3d3937",
              font: { family: "Sora, sans-serif", size: 12 },
              maxTicksLimit: 10
            },
            grid: {
              color: "rgba(90, 80, 74, 0.09)",
              drawBorder: false
            },
            border: { display: true, color: "#2f2f2f", width: 2 }
          },
          y: {
            beginAtZero: true,
            suggestedMax: suggestedMax,
            ticks: {
              stepSize: stepSize,
              color: "#3d3937",
              font: { family: "Sora, sans-serif", size: 12 },
              callback: formatTick
            },
            title: {
              display: true,
              text: "Site Views",
              color: "#2f2f2f",
              font: { family: "Sora, sans-serif", size: 14, weight: "600" }
            },
            grid: {
              color: "rgba(90, 80, 74, 0.09)",
              drawBorder: false
            },
            border: { display: true, color: "#2f2f2f", width: 2 }
          }
        }
      },
      plugins: [createDecorPlugin(repoLabel)]
    });
  }

  async function initVisitorChart() {
    try {
      var response = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" });
      if (!response.ok) throw new Error("Failed to load visitor snapshots");

      var payload = await response.json();
      var records = normalizeRecords(payload.records);
      if (!records.length) {
        setLastSnapshot("No data yet");
        return;
      }

      var latest = records[records.length - 1];
      var repoLabel = (payload.site_url || "yonghao-tan.github.io")
        .replace(/^https?:\/\//, "")
        .replace(/\/$/, "");

      setLastSnapshot(latest.date);
      setSnapshotTotals(latest);

      var series = buildCumulativeSeries(records);
      renderChart(series.labels, series.values, repoLabel);
    } catch (err) {
      setLastSnapshot("Load failed");
      console.warn("[visitor-chart]", err);
    }
  }

  document.addEventListener("DOMContentLoaded", initVisitorChart);
})();
</script>
