<div class="visitor-chart-card">
  <div class="visitor-chart-canvas-wrap">
    <canvas id="visitorChart" class="visitor-chart-canvas"></canvas>
  </div>

  <div class="visitor-chart-meta">
    <span id="busuanzi_container_site_pv" style="margin-right: 16px;">
      <i class="fa fa-eye"></i> Total Views: <span id="busuanzi_value_site_pv">--</span>
    </span>
    <span id="busuanzi_container_site_uv" style="margin-right: 16px;">
      <i class="fa fa-user"></i> Total Visitors: <span id="busuanzi_value_site_uv">--</span>
    </span>
    <span>
      <i class="fa fa-calendar"></i> Last Snapshot: <span id="visitor_last_snapshot">--</span>
    </span>
  </div>
</div>

<style>
  .visitor-chart-card {
    margin-top: 38px;
    padding: 14px 14px 10px;
    border: 1px solid #e6e6e6;
    border-radius: 12px;
    background: #fff;
  }

  .visitor-chart-canvas-wrap {
    width: 100%;
    height: 380px;
  }

  .visitor-chart-canvas {
    width: 100%;
    height: 100%;
  }

  .visitor-chart-meta {
    text-align: center;
    margin-top: 16px;
    color: #5a5a5a;
    font-size: 15px;
    line-height: 1.7;
  }

  @media (max-width: 768px) {
    .visitor-chart-card {
      margin-top: 28px;
      padding: 10px 10px 8px;
    }

    .visitor-chart-canvas-wrap {
      height: 280px;
    }

    .visitor-chart-meta {
      font-size: 14px;
    }
  }
</style>

<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
(function () {
  var MAX_DAYS = 60;
  var DATA_URL = "{{ '/files/visitor-stats.json' | relative_url }}";
  var chartInstance = null;

  function toNumber(value) {
    var n = Number(value);
    return Number.isFinite(n) ? n : 0;
  }

  function normalizeRecords(rawRecords) {
    var mapByDate = {};
    (rawRecords || []).forEach(function (item) {
      if (!item || !item.date) return;
      mapByDate[item.date] = {
        date: item.date,
        site_pv: toNumber(item.site_pv),
        site_uv: toNumber(item.site_uv),
        page_pv: toNumber(item.page_pv)
      };
    });

    return Object.values(mapByDate).sort(function (a, b) {
      return a.date.localeCompare(b.date);
    });
  }

  function formatLabel(dateText) {
    var parts = dateText.split("-");
    if (parts.length !== 3) return dateText;
    return parts[1] + "-" + parts[2];
  }

  function chooseStepSize(maxValue) {
    if (maxValue <= 20) return 5;
    if (maxValue <= 100) return 10;
    if (maxValue <= 500) return 50;
    if (maxValue <= 1000) return 100;
    if (maxValue <= 5000) return 500;
    return 1000;
  }

  function formatTick(value) {
    if (value >= 1000000) return (value / 1000000).toFixed(1) + "M";
    if (value >= 1000) return (value / 1000).toFixed(0) + "K";
    return String(Math.round(value));
  }

  function fitText(ctx, text, maxWidth) {
    if (ctx.measureText(text).width <= maxWidth) return text;
    var base = text;
    while (base.length > 4 && ctx.measureText(base + "...").width > maxWidth) {
      base = base.slice(0, -1);
    }
    return base + "...";
  }

  function buildCumulativeSeries(records) {
    if (!records.length) return { labels: [], values: [] };

    var start = Math.max(0, records.length - MAX_DAYS);
    var labels = [];
    var values = [];

    for (var i = start; i < records.length; i += 1) {
      labels.push(formatLabel(records[i].date));
      values.push(records[i].site_pv);
    }

    return { labels: labels, values: values };
  }

  function setLastSnapshot(text) {
    var el = document.getElementById("visitor_last_snapshot");
    if (el) el.textContent = text || "--";
  }

  function setSnapshotTotals(latest) {
    if (!latest) return;
    var pv = document.getElementById("busuanzi_value_site_pv");
    var uv = document.getElementById("busuanzi_value_site_uv");
    if (pv && (!pv.textContent || pv.textContent === "--")) pv.textContent = latest.site_pv;
    if (uv && (!uv.textContent || uv.textContent === "--")) uv.textContent = latest.site_uv;
  }

  function createDecorPlugin(repoLabel) {
    return {
      id: "visitorDecor",
      afterDatasetsDraw: function (chart) {
        var ctx = chart.ctx;
        var area = chart.chartArea;
        if (!area) return;

        ctx.save();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#1f1f1f";
        ctx.fillStyle = "#1f1f1f";
        ctx.font = '600 16px "Segoe UI", Arial, sans-serif';
        ctx.textBaseline = "middle";

        var maxLabelWidth = Math.min(300, area.width * 0.45);
        var shortLabel = fitText(ctx, repoLabel, maxLabelWidth - 26);
        var textWidth = ctx.measureText(shortLabel).width;
        var boxW = textWidth + 34;
        var boxH = 32;
        var boxX = area.left + 10;
        var boxY = area.top + 8;

        ctx.strokeRect(boxX, boxY, boxW, boxH);
        ctx.fillStyle = "#e3532f";
        ctx.beginPath();
        ctx.arc(boxX + 12, boxY + (boxH / 2), 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#1f1f1f";
        ctx.fillText(shortLabel, boxX + 22, boxY + (boxH / 2));
        ctx.restore();
      }
    };
  }

  function renderChart(labels, values, repoLabel) {
    var canvas = document.getElementById("visitorChart");
    if (!canvas || typeof Chart === "undefined") return;

    if (chartInstance) chartInstance.destroy();

    var maxValue = values.length ? Math.max.apply(null, values) : 0;
    var stepSize = chooseStepSize(maxValue);
    var suggestedMax = Math.max(stepSize * 2, Math.ceil((maxValue * 1.3) / stepSize) * stepSize);
    var pointCount = values.length;

    chartInstance = new Chart(canvas, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          data: values,
          borderColor: "#e3532f",
          borderWidth: 3,
          fill: false,
          tension: 0.18,
          pointRadius: pointCount <= 8 ? 3 : function (ctx) {
            return ctx.dataIndex === pointCount - 1 ? 4 : 0;
          },
          pointHoverRadius: 5,
          pointBackgroundColor: "#e3532f"
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: {
            display: true,
            text: "Visitor History",
            color: "#111",
            font: {
              family: "Segoe UI, Arial, sans-serif",
              size: 24,
              weight: "700"
            },
            padding: { top: 8, bottom: 14 }
          },
          tooltip: {
            displayColors: false,
            callbacks: {
              title: function (items) { return items[0].label; },
              label: function (item) { return "Views: " + item.formattedValue; }
            }
          }
        },
        scales: {
          x: {
            title: {
              display: true,
              text: "Date",
              color: "#222",
              font: { family: "Segoe UI, Arial, sans-serif", size: 16, weight: "600" }
            },
            ticks: {
              color: "#222",
              font: { family: "Segoe UI, Arial, sans-serif", size: 13 },
              maxTicksLimit: 8
            },
            grid: { display: false },
            border: { display: true, color: "#1f1f1f", width: 2 }
          },
          y: {
            beginAtZero: true,
            suggestedMax: suggestedMax,
            ticks: {
              stepSize: stepSize,
              color: "#222",
              font: { family: "Segoe UI, Arial, sans-serif", size: 13 },
              callback: formatTick
            },
            title: {
              display: true,
              text: "Site Views",
              color: "#222",
              font: { family: "Segoe UI, Arial, sans-serif", size: 16, weight: "600" }
            },
            grid: { display: false },
            border: { display: true, color: "#1f1f1f", width: 2 }
          }
        }
      },
      plugins: [createDecorPlugin(repoLabel)]
    });
  }

  async function initVisitorChart() {
    try {
      var response = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" });
      if (!response.ok) throw new Error("Failed to load visitor snapshots");

      var payload = await response.json();
      var records = normalizeRecords(payload.records);
      if (!records.length) {
        setLastSnapshot("No data yet");
        return;
      }

      var latest = records[records.length - 1];
      var repoLabel = (payload.site_url || "yonghao-tan.github.io")
        .replace(/^https?:\/\//, "")
        .replace(/\/$/, "");

      setLastSnapshot(latest.date);
      setSnapshotTotals(latest);

      var series = buildCumulativeSeries(records);
      renderChart(series.labels, series.values, repoLabel);
    } catch (err) {
      setLastSnapshot("Load failed");
      console.warn("[visitor-chart]", err);
    }
  }

  document.addEventListener("DOMContentLoaded", initVisitorChart);
})();
</script>
